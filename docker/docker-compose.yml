version: '3.8'

services:
  nats:
    image: nats:latest
    ports:
      - "4222:4222"
      - "6222:6222" 
      - "8222:8222"

  postgres:
    image: postgres:13
    environment:
      POSTGRES_DB: kubechat
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  users-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.users
    ports:
      - "50051:50051"
    depends_on:
      - nats

  presence-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.presence
    ports:
      - "50052:50052"
    depends_on:
      - nats
      - redis
    environment:
      - NATS_URL=nats://nats:4222
      - REDIS_ADDR=redis:6379

  chat-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.chat
    ports:
      - "50053:50053"
    depends_on:
      - nats
      - message-store-service

  message-store-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.messagestore
    ports:
      - "50054:50054"
    depends_on:
      - nats
      - postgres
    environment:
      - DATABASE_URL=postgres://user:password@postgres:5432/kubechat?sslmode=disable

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

  media-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.media
    ports:
      - "50055:50055"
      - "8081:8081"
    depends_on:
      - minio
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - PUBLIC_MEDIA_URL=http://localhost:9000

  api-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gateway
    ports:
      - "8080:8080"
    depends_on:
      - users-service
      - chat-service
      - presence-service
      - media-service
      - nats

volumes:
  postgres_data:
  minio_data: